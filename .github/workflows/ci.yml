name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  core-tests:
    name: Rust core (classifier) tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: cargo test
        working-directory: core
        run: cargo test --verbose

  ios-build:
    name: Build unsigned IPA
    runs-on: macos-latest
    permissions:
      contents: write   # for the per-commit Release
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Build unsigned IPA
        run: bash scripts/build_unsigned_ipa.sh
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ActionRelay-unsigned
          path: ActionRelay-unsigned.ipa
          if-no-files-found: error
      - name: Publish to Release (main pushes)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="build-${GITHUB_SHA:0:7}"
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" \
            --prerelease \
            --title "ActionRelay $TAG (unsigned)" \
            --notes "Automated unsigned dev build from \`${GITHUB_SHA}\`.

          Single-target, **zero restricted entitlements** — sign with Feather + any cert (incl. import-only) and it installs. Not yet functional: the idevice tunnel/relay runtime is unwired (see docs/integration.md), so no button events stream until that lands.

          - \`ActionRelay-unsigned.ipa\` — the app (RelayClient is the stub).
          - \`ActionRelay-idevice-unsigned.ipa\` — present only when the idevice link-probe ran for this commit."
          gh release upload "$TAG" ActionRelay-unsigned.ipa --clobber
