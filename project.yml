name: ActionRelay
options:
  bundleIdPrefix: com.clinshaiju
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Manual
    # NE-free, single-target, ZERO restricted entitlements — installable with an
    # import-only/wildcard cert (docs/integration.md). Background persistence is a
    # silent-audio keepalive, not a Network Extension.

targets:
  ActionRelay:
    type: application
    platform: iOS
    sources:
      - path: app/ActionRelay
    # XcodeGen GENERATES this Info.plist from `properties` (do not hand-write a
    # separate file — `info.path` overwrites it). These keys are essential:
    #   UILaunchStoryboardName → full-screen (else iPhone-8-aspect letterbox)
    #   UIBackgroundModes audio → the silent-audio keepalive can run backgrounded
    info:
      path: app/Info.plist
      properties:
        CFBundleDisplayName: ActionRelay
        LSRequiresIPhoneOS: true
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        UIBackgroundModes: [audio]
        # The userspace tunnel connects to the device's own dev services at
        # 10.7.0.1 — a LOCAL network address. iOS Local Network privacy blocks
        # that (silent timeout) unless the app declares intent and the user
        # grants the "Local Network" permission. NSBonjourServices is what
        # StikDebug ships to unlock the same path.
        NSLocalNetworkUsageDescription: "ActionRelay connects to this device's own developer tunnel (10.7.0.1) to read Action Button presses. Required for the listener."
        NSBonjourServices: [_remotepairing._tcp, _remoted._tcp]
        # "Open in ActionRelay" from the share sheet (robust pairing import).
        LSSupportsOpeningDocumentsInPlace: true
        CFBundleDocumentTypes:
          - CFBundleTypeName: Pairing File
            LSHandlerRank: Alternate
            LSItemContentTypes: [public.data, com.apple.property-list, public.xml]
    # No entitlements file on purpose.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clinshaiju.actionrelay

schemes:
  ActionRelay:
    build:
      targets:
        ActionRelay: all
    run:
      config: Debug
    archive:
      config: Release
