name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  core-tests:
    name: Rust core (classifier) tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: cargo test
        working-directory: core
        run: cargo test --verbose

  ios-build:
    name: Build unsigned IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Build unsigned IPA
        run: bash scripts/build_unsigned_ipa.sh
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ActionRelay-unsigned
          path: ActionRelay-unsigned.ipa
          if-no-files-found: error
