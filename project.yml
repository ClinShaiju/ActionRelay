name: ActionRelay
options:
  bundleIdPrefix: com.clinshaiju
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Manual
    # NE-free, single-target, ZERO restricted entitlements — installable with an
    # import-only/wildcard cert (docs/integration.md). Background persistence is a
    # silent-audio keepalive, not a Network Extension.

targets:
  ActionRelay:
    type: application
    platform: iOS
    sources:
      - path: app/ActionRelay
    info:
      path: app/Info.plist
    # No entitlements file on purpose.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clinshaiju.actionrelay

schemes:
  ActionRelay:
    build:
      targets:
        ActionRelay: all
    run:
      config: Debug
    archive:
      config: Release
