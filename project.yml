name: ActionRelay
options:
  bundleIdPrefix: com.clinshaiju
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    # CI builds unsigned (see .github/workflows). Real signing is done by Feather
    # on-device with the distribution cert + the two .mobileprovision files (§9).
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""

targets:
  ActionRelay:
    type: application
    platform: iOS
    sources:
      - path: app/ActionRelay
    info:
      path: app/Info.plist
    entitlements:
      path: app/ActionRelay.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clinshaiju.actionrelay
    dependencies:
      - target: ActionRelayTunnel

  ActionRelayTunnel:
    type: app-extension
    platform: iOS
    sources:
      - path: tunnel
      # Shared models live with the app but are compiled into the NE too.
      - path: app/ActionRelay/Shared/Shared.swift
    info:
      path: tunnel/Info.plist
    entitlements:
      path: tunnel/Tunnel.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clinshaiju.actionrelay.tunnel

schemes:
  ActionRelay:
    build:
      targets:
        ActionRelay: all
    run:
      config: Debug
    archive:
      config: Release
