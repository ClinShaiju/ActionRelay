# Diagnostic spec: app ONLY — no Network Extension target, no entitlements.
# Purpose: confirm whether a krava/shared cert can install a plain ActionRelay.
# If this installs but the full build doesn't, the NE/restricted entitlements are
# the blocker → pivot to the NE-free architecture (docs/integration.md strategy 2).
name: ActionRelay
options:
  bundleIdPrefix: com.clinshaiju
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Manual

targets:
  ActionRelay:
    type: application
    platform: iOS
    sources:
      - path: app/ActionRelay
    info:
      path: app/Info.plist
    # No entitlements file on purpose — plainest possible app.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clinshaiju.actionrelay

schemes:
  ActionRelay:
    build:
      targets:
        ActionRelay: all
    archive:
      config: Release
