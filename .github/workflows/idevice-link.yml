name: idevice link probe

# Manual only — proves the NE compiles + links against IDevice.xcframework with
# the real syslog_relay FFI path (#if canImport(IDevice)). Not on push: the
# xcframework is 213 MB. Runtime tunnel validation still needs a signed device
# build (docs/integration.md).
on:
  workflow_dispatch:

jobs:
  link-probe:
    name: Compile NE against idevice
    runs-on: macos-latest
    permissions:
      contents: write   # for the per-commit Release
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Fetch idevice xcframework
        run: bash scripts/fetch_idevice.sh
      - name: Build idevice-linked unsigned IPA
        run: bash scripts/build_unsigned_ipa.sh project.idevice.yml ActionRelay-idevice-unsigned.ipa
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ActionRelay-idevice-unsigned
          path: ActionRelay-idevice-unsigned.ipa
          if-no-files-found: error
      - name: Publish to Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="build-${GITHUB_SHA:0:7}"
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" \
            --prerelease --title "ActionRelay $TAG (unsigned)" \
            --notes "Automated unsigned dev build from \`${GITHUB_SHA}\`. Sign with Feather (PROJECT.md §9) before installing."
          gh release upload "$TAG" ActionRelay-idevice-unsigned.ipa --clobber
