# Compose spec for the idevice link-probe (docs/integration.md). Extends the base
# project and links IDevice.xcframework into the single app target so the
# #if canImport(IDevice) relay path compiles. Used only by idevice-link.yml — the
# main build (project.yml) stays free of the 213 MB dependency.
include:
  - project.yml

targets:
  ActionRelay:
    dependencies:
      - framework: vendor/IDevice.xcframework
        embed: true
        codeSignOnCopy: true
